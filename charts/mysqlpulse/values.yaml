replicaCount: 1

image:
  repository: ghcr.io/ppiankov/mysqlpulse
  tag: "0.1.0"
  pullPolicy: IfNotPresent

mysql:
  dsn: "root@tcp(mysql:3306)/"
  metricsPort: 9104
  pollInterval: "15s"

service:
  type: ClusterIP
  port: 9104

serviceMonitor:
  enabled: false
  interval: "15s"
  labels: {}

prometheusRule:
  enabled: false
  labels: {}

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
