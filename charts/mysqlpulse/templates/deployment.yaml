{{- range .Values.targets }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mysqlpulse.targetFullname" (dict "root" $ "target" .) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "mysqlpulse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mysqlpulse.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "mysqlpulse.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysqlpulse
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args: ["serve"]
          env:
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | default (include "mysqlpulse.targetFullname" (dict "root" $ "target" .)) }}
                  key: dsn
            - name: METRICS_PORT
              value: {{ .metricsPort | default 9104 | quote }}
            - name: POLL_INTERVAL
              value: {{ .pollInterval | default "15s" | quote }}
            {{- if .telegramToken }}
            - name: ALERT_TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysqlpulse.targetFullname" (dict "root" $ "target" .) }}
                  key: telegram-token
            - name: ALERT_TELEGRAM_CHAT
              value: {{ .telegramChat | quote }}
            {{- end }}
            {{- if .webhookURL }}
            - name: ALERT_WEBHOOK_URL
              value: {{ .webhookURL | quote }}
            {{- end }}
            {{- if .grafanaURL }}
            - name: GRAFANA_URL
              value: {{ .grafanaURL | quote }}
            - name: GRAFANA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysqlpulse.targetFullname" (dict "root" $ "target" .) }}
                  key: grafana-token
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .metricsPort | default 9104 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          {{- with $.Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
