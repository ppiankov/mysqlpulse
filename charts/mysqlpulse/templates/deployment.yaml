apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mysqlpulse
  labels:
    app.kubernetes.io/name: mysqlpulse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mysqlpulse
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysqlpulse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mysqlpulse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          env:
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mysqlpulse
                  key: dsn
            - name: METRICS_PORT
              value: "{{ .Values.mysql.metricsPort }}"
            - name: POLL_INTERVAL
              value: "{{ .Values.mysql.pollInterval }}"
          ports:
            - name: metrics
              containerPort: {{ .Values.mysql.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
