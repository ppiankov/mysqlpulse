apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mysqlpulse
  labels:
    app.kubernetes.io/name: mysqlpulse
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  dsn: {{ .Values.mysql.dsn | quote }}
  {{- if .Values.alerting.telegramToken }}
  telegram-token: {{ .Values.alerting.telegramToken | quote }}
  {{- end }}
  {{- if .Values.alerting.grafanaToken }}
  grafana-token: {{ .Values.alerting.grafanaToken | quote }}
  {{- end }}
